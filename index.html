<!DOCTYPE html>
<html>
<head>

<title>User Information</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#1e3c72,#2a5298);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
color:white;
}

.container{
background:rgba(0,0,0,0.85);
padding:40px;
border-radius:12px;
width:380px;
text-align:center;
}

h2{
margin-bottom:20px;
}

input,select,button{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
border-radius:6px;
border:none;
}

button{
background:#00aaff;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#008ecc;
}

</style>

</head>

<body>

<div class="container">

<h2>User Information</h2>

<input type="text" id="name" placeholder="Enter Your Name">

<input type="text" id="regno" placeholder="Register Number (Optional)">

<input type="text" id="profession" placeholder="Enter Profession">

<input type="text" id="college" placeholder="Enter College Name">

<input type="tel" id="mobile" placeholder="Enter Mobile Number">

<input type="email" id="email" placeholder="Enter Email ID">

<button onclick="goToCalculator()">Submit</button>

</div>

<script>

function goToCalculator(){

let name=document.getElementById("name").value;
let regno=document.getElementById("regno").value;
let profession=document.getElementById("profession").value;
let college=document.getElementById("college").value;
let mobile=document.getElementById("mobile").value;
let email=document.getElementById("email").value;

if(name=="" || profession=="" || college=="" || mobile=="" || email==""){
alert("Please fill all required fields");
return;
}

/* store current user name */

localStorage.setItem("username",name);

/* save user history locally */

let users=JSON.parse(localStorage.getItem("userList")) || [];

let userData={
name:name,
register:regno,
profession:profession,
college:college,
mobile:mobile,
email:email,
time:new Date().toLocaleString()
};

users.push(userData);

localStorage.setItem("userList",JSON.stringify(users));

/* prepare data for Google Sheets */

let sheetData={
name:name,
regno:regno,
profession:profession,
college:college,
mobile:mobile,
email:email
};

/* send data to Google Sheets */

fetch("https://script.google.com/macros/s/AKfycbx1ipMy2-g33-x1NR3dlEma2nPvuPlAYYv9TntapvJTPfFAkyeJ9uxXPdf56yOKopoB/exec",{
method:"POST",
body:JSON.stringify(sheetData)
})
.then(response=>response.text())
.then(data=>{
console.log("Saved to Google Sheets:",data);
})
.catch(error=>{
console.log("Error:",error);
});

/* redirect to calculator */

window.location.href="fd_calculator.html";

}

</script>

</body>

</html>
