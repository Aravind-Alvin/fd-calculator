<!DOCTYPE html>
<html>
<head>

<title>Fixed Deposit Calculator</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background-image:url("https://images.unsplash.com/photo-1554224155-6726b3ff858f");
background-size:cover;
background-position:center;
margin:0;
color:white;
}

.container{
background:rgba(0,0,0,0.85);
max-width:650px;
margin:auto;
margin-top:40px;
padding:30px;
border-radius:12px;
text-align:center;
}

h1{
font-size:30px;
margin-bottom:10px;
}

#welcome{
color:#ffd700;
margin-bottom:20px;
}

.bank-logos{
display:flex;
justify-content:space-around;
margin-bottom:20px;
}

.bank-logos img{
width:60px;
height:60px;
background:white;
padding:5px;
border-radius:10px;
}

select,input,button{
width:100%;
padding:12px;
margin:10px 0;
font-size:16px;
border-radius:6px;
border:none;
}

button{
background:#00aaff;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#008ecc;
}

.result{
font-size:18px;
margin-top:20px;
}

table{
margin-top:20px;
background:white;
color:black;
border-collapse:collapse;
}

table th,table td{
padding:8px;
border:1px solid black;
}

canvas{
margin-top:25px;
}

</style>

</head>

<body>

<div class="container">

<h1>Fixed Deposit Calculator</h1>

<h3 id="welcome"></h3>

<div class="bank-logos">

<img src="https://upload.wikimedia.org/wikipedia/commons/c/cc/SBI-logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/2/28/HDFC_Bank_Logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/12/ICICI_Bank_Logo.svg">
<img src="https://upload.wikimedia.org/wikipedia/commons/1/1a/Axis_Bank_logo.svg">

</div>

<select id="bank" onchange="updateRate()">
<option value="">Select Bank</option>
<option value="sbi">SBI</option>
<option value="hdfc">HDFC</option>
<option value="icici">ICICI</option>
<option value="axis">AXIS</option>
</select>

<input type="number" id="amount" placeholder="Enter FD Amount">

<select id="tenure" onchange="updateRate()">
<option value="">Select Tenure</option>
<option value="6">6 Months</option>
<option value="3">3 Years</option>
<option value="5">5 Years</option>
</select>

<p id="rate"></p>

<label>Booking Date</label>
<input type="date" id="bookingDate">

<select id="payout">
<option value="">Interest Payout</option>
<option value="1">On Maturity / Yearly</option>
<option value="2">Half Yearly</option>
<option value="4">Quarterly</option>
<option value="12">Monthly</option>
</select>

<button onclick="calculateFD()">Calculate</button>

<button onclick="closeApp()">Close</button>

<div class="result" id="result"></div>

<h3>Bank Maturity Comparison</h3>

<table id="comparisonTable" width="100%" style="display:none">

<tr>
<th>Bank</th>
<th>Interest Rate</th>
<th>Maturity Amount</th>
</tr>

<tr>
<td>SBI</td>
<td id="sbiRate"></td>
<td id="sbiAmount"></td>
</tr>

<tr>
<td>HDFC</td>
<td id="hdfcRate"></td>
<td id="hdfcAmount"></td>
</tr>

<tr>
<td>ICICI</td>
<td id="iciciRate"></td>
<td id="iciciAmount"></td>
</tr>

<tr>
<td>AXIS</td>
<td id="axisRate"></td>
<td id="axisAmount"></td>
</tr>

</table>

<canvas id="barChart"></canvas>

<canvas id="pieChart"></canvas>

</div>

<script>

window.onload=function(){

let name=localStorage.getItem("username");
let dept=localStorage.getItem("department");

if(name && dept){
document.getElementById("welcome").innerHTML=
"Welcome "+name+" ("+dept+" Department)";
}

}

let rates={
sbi:{6:5.65,3:6.30,5:6.15},
hdfc:{6:5.50,3:6.45,5:6.15},
icici:{6:5.50,3:6.45,5:6.50},
axis:{6:5.50,3:6.60,5:6.60}
};

let barChart;
let pieChart;

function updateRate(){

let bank=document.getElementById("bank").value;
let tenure=document.getElementById("tenure").value;

if(bank && tenure){

let rate=rates[bank][tenure];

document.getElementById("rate").innerHTML="Interest Rate: "+rate+"%";

}

}

function calculateFD(){

let bank=document.getElementById("bank").value;
let P=parseFloat(document.getElementById("amount").value);
let tenure=document.getElementById("tenure").value;
let n=parseFloat(document.getElementById("payout").value);
let bookingDate=document.getElementById("bookingDate").value;

if(!bank || !P || !tenure || !n || !bookingDate){

alert("Please fill all fields");
return;

}

let r=rates[bank][tenure]/100;

let t;

if(tenure==6)
t=0.5;
else
t=tenure;

let A=P*Math.pow((1+r/n),(n*t));

let interest=A-P;

let payoutAmount=(P*r)/n;

let date=new Date(bookingDate);

if(tenure==6)
date.setMonth(date.getMonth()+6);
else
date.setFullYear(date.getFullYear()+parseInt(tenure));

let maturityDate=date.toLocaleDateString();

document.getElementById("result").innerHTML=

"<b>Total Maturity Amount: ₹ "+A.toFixed(2)+"</b><br><br>"+
"Principal Amount: ₹ "+P.toFixed(2)+"<br>"+
"Interest Earned: ₹ "+interest.toFixed(2)+"<br>"+
"Interest Payout Per Period: ₹ "+payoutAmount.toFixed(2)+"<br>"+
"Maturity Date: "+maturityDate;

drawBarChart(P,interest);

drawPieChart(P,interest);

calculateComparison(P,tenure,n);

}

function drawBarChart(P,I){

let ctx=document.getElementById('barChart').getContext('2d');

if(barChart){
barChart.destroy();
}

barChart=new Chart(ctx,{
type:'bar',
data:{
labels:['Principal','Interest Earned'],
datasets:[{
label:'Amount',
data:[P,I],
backgroundColor:['#00aaff','#ffd700']
}]
}
});

}

function drawPieChart(P,I){

let ctx=document.getElementById('pieChart').getContext('2d');

if(pieChart){
pieChart.destroy();
}

pieChart=new Chart(ctx,{
type:'pie',
data:{
labels:['Principal Amount','Interest Earned'],
datasets:[{
data:[P,I],
backgroundColor:['#00aaff','#ffd700']
}]
}
});

}

function calculateComparison(P,tenure,n){

document.getElementById("comparisonTable").style.display="table";

let banks=["sbi","hdfc","icici","axis"];

banks.forEach(function(bank){

let r=rates[bank][tenure]/100;

let t;

if(tenure==6)
t=0.5;
else
t=tenure;

let A=P*Math.pow((1+r/n),(n*t));

document.getElementById(bank+"Rate").innerHTML=rates[bank][tenure]+"%";

document.getElementById(bank+"Amount").innerHTML="₹ "+A.toFixed(2);

});

}

function closeApp(){

window.location.href="users.html";

}

</script>

</body>
</html>
